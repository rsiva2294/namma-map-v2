<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/branding/icon.png" />

  <meta name="theme-color" content="#0f172a" />
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
  <meta name="application-name" content="NammaMap" />
  <link rel="canonical" href="https://nammamap.in/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />

  <meta property="og:site_name" content="NammaMap" />
  <meta property="og:title" content="NammaMap | Tamil Nadu Civic GIS" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="NammaMap | Tamil Nadu Civic GIS" />
  <meta property="twitter:description"
    content="Tamil Nadu civic GIS portal for finding pincodes, PDS ration shops, TNEB offices, police stations, health facilities, and local bodies." />
  <meta property="twitter:image" content="https://nammamap.in/branding/og-image.png" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/branding/icon.png" />
  <!-- Resource Preloading & Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://basemaps.cartocdn.com">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Public+Sans:wght@400;500;600;700;800&display=swap" as="style">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Public+Sans:wght@400;500;600;700;800&display=swap">
  <link rel="preload" href="/branding/icon.png" as="image" fetchpriority="high">

  <style>
    :root {
      --bg-main: #faf8ff;
      --bg-card: #ededf8;
      --border: rgba(0, 0, 0, 0.1);
      --text-secondary: #434654;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-main);
      color: #191b23;
      font-family: 'Public Sans', 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }
    #root {
      width: 100vw;
      height: 100vh;
      display: flex;
    }
    .skeleton-container {
      display: flex;
      width: 100%;
      height: 100dvh;
      background: var(--bg-main);
      overflow: hidden;
    }
    .skeleton-sidebar {
      width: 280px;
      height: 100%;
      border-right: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      z-index: 10;
    }
    @media (max-width: 768px) {
      .skeleton-sidebar { display: none; }
    }
    .skeleton-logo-group { display: flex; align-items: center; gap: 12px; }
    .skeleton-logo { width: 32px; height: 32px; border-radius: 8px; }
    .skeleton-text-short { width: 100px; height: 20px; border-radius: 4px; background: var(--bg-card); }
    .skeleton-nav { display: flex; flex-direction: column; gap: 12px; flex: 1; }
    .skeleton-nav-item { height: 44px; border-radius: 10px; background: var(--bg-card); opacity: 0.6; }
    .skeleton-footer { display: flex; flex-direction: column; gap: 12px; }
    .skeleton-main { flex: 1; position: relative; display: flex; flex-direction: column; }
    .skeleton-search-bar {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 500px; height: 56px; border-radius: 28px;
      background: var(--bg-card); z-index: 20; border: 1px solid var(--border);
    }
    .skeleton-map { flex: 1; background: var(--bg-main); display: flex; align-items: center; justify-content: center; position: relative; }
    .skeleton-map-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 50px 50px; opacity: 0.2;
    }
    .skeleton-engine-text {
      font-weight: 500; color: var(--text-secondary); background: var(--bg-card);
      padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
    }
    .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.4; } }
  </style>
</head>

<body>
  <div id="root">
    <div class="skeleton-container">
      <div class="skeleton-sidebar">
        <div class="skeleton-logo-group">
          <img src="/branding/icon.png" class="skeleton-logo" alt="Logo" />
          <div class="skeleton-text-short pulse"></div>
        </div>
        <div class="skeleton-nav">
          <div class="skeleton-nav-item pulse"></div>
          <div class="skeleton-nav-item pulse"></div>
          <div class="skeleton-nav-item pulse"></div>
          <div class="skeleton-nav-item pulse"></div>
          <div class="skeleton-nav-item pulse"></div>
        </div>
      </div>
      <div class="skeleton-main">
        <div class="skeleton-search-bar pulse"></div>
        <div class="skeleton-map">
          <div class="skeleton-map-grid"></div>
          <div class="skeleton-engine-text">Initializing...</div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
